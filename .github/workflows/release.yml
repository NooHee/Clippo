name: Build & Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & package
        run: npm run dist
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Get version
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.pkg.outputs.version }}-${{ github.run_number }}
          name: ClipStack v${{ steps.pkg.outputs.version }} (build ${{ github.run_number }})
          body: |
            Automated build from commit ${{ github.sha }}

            **Download the right file for your Mac:**
            - `ClipStack-*-arm64-mac.zip` → Apple Silicon (M1/M2/M3/M4) — unzip and drag to Applications
            - `ClipStack-*.dmg` → Intel Mac

            > First launch: right-click the app → Open to bypass Gatekeeper.
          files: |
            release/*.dmg
            release/*.zip
          draft: false
          prerelease: false
